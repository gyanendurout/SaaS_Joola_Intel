name: Weekly Data Pipeline

# Runs the full data refresh chain:
#   1. backend.scraping  — 9 channels + AI enrichment + facts derivation
#   2. analytics_backend — marts refresh + statistical analyses
#
# Schedule: Monday 01:30 UTC = Monday 07:00 IST = Monday 21:30 ET (Sunday).
# Manual trigger via "Run workflow" in the Actions tab also supported.

on:
  schedule:
    - cron: '30 1 * * 1'
  workflow_dispatch:
    inputs:
      stage:
        description: 'Which stage to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - scraping-only
          - analytics-only
          - enrichment-only
          - facts-only
      dry_run:
        description: 'Dry run (no API calls, no DB writes)'
        required: false
        default: false
        type: boolean

# Allow only one pipeline run at a time. New triggers cancel earlier in-flight
# runs so a manual trigger during a slow scheduled run takes priority.
concurrency:
  group: weekly-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    name: Scrape → Enrich → Facts → Analytics
    runs-on: ubuntu-latest
    timeout-minutes: 240   # 4 hours — generous; full run is normally 30-60 min

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            analytics_backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install analytics_backend dependencies
        run: pip install -r analytics_backend/requirements.txt

      - name: Resolve stage
        id: stage
        run: |
          STAGE="${{ github.event.inputs.stage || 'all' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY" >> "$GITHUB_OUTPUT"
          if [ "$DRY" = "true" ]; then
            echo "dry_flag=--dry-run" >> "$GITHUB_OUTPUT"
          else
            echo "dry_flag=" >> "$GITHUB_OUTPUT"
          fi
          echo "Stage: $STAGE  Dry-run: $DRY"

      # ── Scraping ─────────────────────────────────────────────────────────
      - name: Backend scraping pipeline
        if: contains(fromJSON('["all", "scraping-only"]'), steps.stage.outputs.stage)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m backend.scraping.run --module all --restart ${{ steps.stage.outputs.dry_flag }}

      # ── Enrichment-only path (replays AI enrichment without re-scraping) ─
      - name: Enrichment only
        if: steps.stage.outputs.stage == 'enrichment-only'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m backend.scraping.run --module enrichment ${{ steps.stage.outputs.dry_flag }}

      # ── Facts-only path (rebuild mention_facts etc. after manual fixup) ──
      - name: Facts only
        if: steps.stage.outputs.stage == 'facts-only'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m backend.scraping.run --module facts ${{ steps.stage.outputs.dry_flag }}

      # ── Analytics ────────────────────────────────────────────────────────
      - name: Analytics backend (marts + statistics)
        if: contains(fromJSON('["all", "analytics-only"]'), steps.stage.outputs.stage)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m analytics_backend.run --module all ${{ steps.stage.outputs.dry_flag }}

      # ── Logs as artifact regardless of outcome ───────────────────────────
      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: |
            *.log
            **/*.log
            !node_modules/**
            !frontend/node_modules/**
            !.venv/**
          if-no-files-found: ignore
          retention-days: 14

      # ── Summary in the Actions UI ────────────────────────────────────────
      - name: Pipeline summary
        if: always()
        run: |
          echo "## Pipeline summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Stage: \`${{ steps.stage.outputs.stage }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry run: \`${{ steps.stage.outputs.dry_run }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trigger: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Outcome: \`${{ job.status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Logs uploaded as artifact \`pipeline-logs-${{ github.run_id }}\` (14-day retention)." >> "$GITHUB_STEP_SUMMARY"
